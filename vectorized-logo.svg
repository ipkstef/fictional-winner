<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 530" role="img" aria-labelledby="logo-title">
  <title id="logo-title">MTGSold Logo</title>

  <!-- Bar chart icon — 3 perspective bars, ascending left to right -->
  <g transform="translate(250, 245) skewX(8)">
    <!-- Bar 1: shortest, slate gray -->
    <rect x="-88" y="-120" width="44" height="120" fill="#495562"/>
    <rect x="-44" y="-120" width="9"  height="120" fill="#374151"/>
    <!-- Bar 2: medium, navy blue -->
    <rect x="-30" y="-158" width="44" height="158" fill="#2a4171"/>
    <rect x="14"  y="-158" width="9"  height="158" fill="#1e3050"/>
    <!-- Bar 3: tallest, dark charcoal -->
    <rect x="28"  y="-195" width="44" height="195" fill="#3e3e3f"/>
    <rect x="72"  y="-195" width="9"  height="195" fill="#2d2d2e"/>
  </g>

  <!-- Curved sparkline over the bars -->
  <path
    d="M 168,178 C 182,170 192,168 205,158 C 218,148 225,142 238,128 C 251,114 258,108 272,95 C 286,82 296,68 310,58 C 318,52 322,50 328,48"
    fill="none"
    stroke="#2a4171"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="250" y="345"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="76"
        font-weight="700"
        fill="#3e3e3f"
        letter-spacing="1">MTGSold</text>

  <!-- Underline accent -->
  <rect x="100" y="365" width="300" height="8" fill="#2a4171"/>
</svg>
